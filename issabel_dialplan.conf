; ============================================================
; BLOQUE PARA LIVEKIT (Añadir al final de extensions_custom.conf)
; ============================================================
; Propósito: Limpiar las comillas que LiveKit manda en el header
; SIP "To:" antes de enrutar la llamada a la troncal móvil.
; ============================================================

[from-livekit-clean]
; Este contexto recibe la llamada SIP de LiveKit y normaliza el DID.
; LiveKit envía: "573005380776" (con comillas)
; Asterisk procesa: 573005380776  (limpio y enrutable)

exten => _X.,1,NoOp(=== Sofía LiveKit: DID crudo recibido: ${EXTEN} ===)
 same => n,Set(CLEAN_NUM=${FILTER(\-0-9,${EXTEN})})
 same => n,NoOp(=== DID limpio para marcar: ${CLEAN_NUM} ===)
 same => n,Goto(from-internal,${CLEAN_NUM},1)
 same => n,Hangup()

; Captura también si viene como solo letras o vacío (falla segura)
exten => s,1,Hangup()
exten => i,1,Hangup()
exten => t,1,Hangup()
